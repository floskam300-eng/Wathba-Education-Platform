<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2540"/>
    </linearGradient>
    <linearGradient id="circle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="360" cy="30" r="60" fill="white" fill-opacity="0.04"/>
  <circle cx="40" cy="195" r="80" fill="white" fill-opacity="0.03"/>
  <circle cx="200" cy="112" r="130" fill="white" fill-opacity="0.02"/>

  <!-- Dot grid pattern -->
  <g fill="white" fill-opacity="0.06">
    <circle cx="20" cy="20" r="2"/>
    <circle cx="60" cy="20" r="2"/>
    <circle cx="100" cy="20" r="2"/>
    <circle cx="340" cy="20" r="2"/>
    <circle cx="380" cy="20" r="2"/>
    <circle cx="20" cy="60" r="2"/>
    <circle cx="380" cy="60" r="2"/>
    <circle cx="20" cy="160" r="2"/>
    <circle cx="380" cy="160" r="2"/>
    <circle cx="20" cy="200" r="2"/>
    <circle cx="60" cy="200" r="2"/>
    <circle cx="340" cy="200" r="2"/>
    <circle cx="380" cy="200" r="2"/>
  </g>

  <!-- Center icon background circle -->
  <circle cx="200" cy="100" r="46" fill="url(#circle)" fill-opacity="0.15"/>
  <circle cx="200" cy="100" r="36" fill="url(#circle)" fill-opacity="0.2"/>

  <!-- Book icon (open book) -->
  <g transform="translate(200,100)" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left page -->
    <path d="M-18,-16 C-18,-16 -10,-18 0,-16 L0,16 C-10,14 -18,16 -18,16 Z" fill="white" fill-opacity="0.15"/>
    <!-- Right page -->
    <path d="M18,-16 C18,-16 10,-18 0,-16 L0,16 C10,14 18,16 18,16 Z" fill="white" fill-opacity="0.15"/>
    <!-- Spine -->
    <line x1="0" y1="-16" x2="0" y2="16"/>
    <!-- Left page outline -->
    <path d="M-18,-16 C-18,-16 -10,-18 0,-16 L0,16 C-10,14 -18,16 -18,16 Z"/>
    <!-- Right page outline -->
    <path d="M18,-16 C18,-16 10,-18 0,-16 L0,16 C10,14 18,16 18,16 Z"/>
    <!-- Lines on left page -->
    <line x1="-13" y1="-8" x2="-4" y2="-9" stroke-opacity="0.7"/>
    <line x1="-13" y1="-2" x2="-4" y2="-3" stroke-opacity="0.7"/>
    <line x1="-13" y1="4" x2="-4" y2="3" stroke-opacity="0.7"/>
    <!-- Lines on right page -->
    <line x1="13" y1="-8" x2="4" y2="-9" stroke-opacity="0.7"/>
    <line x1="13" y1="-2" x2="4" y2="-3" stroke-opacity="0.7"/>
    <line x1="13" y1="4" x2="4" y2="3" stroke-opacity="0.7"/>
  </g>

  <!-- Orange accent line -->
  <rect x="0" y="215" width="400" height="10" fill="url(#circle)" fill-opacity="0.6" rx="0"/>

  <!-- Bottom text -->
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" fill-opacity="0.5" letter-spacing="2">WATHBA COURSE</text>
</svg>
