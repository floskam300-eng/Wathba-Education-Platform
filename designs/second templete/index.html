<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>القالب الثاني — Dock & Glass</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="themeToggle" class="theme-toggle" title="تبديل الثيم">🌙</button>

  <div class="shell">
    <!-- منطقة العرض الرئيسية -->
    <section class="viewer">
      <!-- هيدر شفاف عائم فوق الفيديو -->
      <header class="glass-bar">
        <button class="g-back">→ كورساتي</button>
        <span class="g-title">الكيمياء العضوية</span>
        <span class="g-pos">3 / 14</span>
      </header>

      <div class="video">
        <div class="play-btn">▶</div>
        <div class="wm">أحمد محمد · WB-2048</div>
      </div>

      <!-- شريط معلومات سفلي مدمج -->
      <div class="under-bar">
        <div class="ub-text">
          <h2>المركبات الأروماتية</h2>
          <p>⏱ 14 دقيقة · محاضرة 3</p>
        </div>
        <button class="next-btn">التالي ›</button>
      </div>
    </section>

    <!-- لوحة المحتوى الجانبية (تتحول dock على الموبايل) -->
    <aside class="panel">
      <div class="dock">
        <button class="dock-tab active" data-tab="videos"><span>🎬</span><i>المحاضرات</i></button>
        <button class="dock-tab" data-tab="files"><span>📄</span><i>الملفات</i></button>
        <button class="dock-tab" data-tab="quiz"><span>📖</span><i>التسميع</i></button>
      </div>

      <div class="panel-body">
        <div class="phead">
          <h3>المحاضرات</h3>
          <span class="count">14 درس</span>
        </div>

        <div class="cards">
          <button class="card done">
            <span class="thumb">✓</span>
            <span class="c-info"><b>مقدمة الكيمياء العضوية</b><i>⏱ 6:20 · مكتمل</i></span>
          </button>
          <button class="card active">
            <span class="thumb">▶</span>
            <span class="c-info"><b>المركبات الأروماتية</b>
              <i>⏱ 14:00 · 35%</i>
              <span class="bar"><span style="width:35%"></span></span>
            </span>
          </button>
          <button class="card">
            <span class="thumb">3</span>
            <span class="c-info"><b>التفاعلات الإضافية</b><i>⏱ 11:45</i></span>
          </button>
          <button class="card locked">
            <span class="thumb">🔒</span>
            <span class="c-info"><b>تمارين الفصل الأول</b><i>يتطلب اجتياز تسميع</i></span>
          </button>
          <button class="card">
            <span class="thumb">5</span>
            <span class="c-info"><b>الكحولات والإيثرات</b><i>⏱ 9:30</i></span>
          </button>
        </div>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
