version: "3.8"

services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    volumes:
      - ./livekit/config.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    environment:
      - LIVEKIT_CONFIG=/etc/livekit.yaml
    networks:
      - livekit-net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - livekit
    networks:
      - livekit-net

volumes:
  caddy_data:
  caddy_config:

networks:
  livekit-net:
    driver: bridge
